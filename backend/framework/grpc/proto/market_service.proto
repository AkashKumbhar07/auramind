syntax = "proto3";

package auramind.market;

option go_package = "github.com/AkashKumbhar07/auramind/backend/framework/grpc/generated/market;market";

service MarketService {
  rpc GetPairs(GetPairsRequest) returns (GetPairsResponse);
  rpc GetCandles(GetCandlesRequest) returns (GetCandlesResponse);
  rpc GetTicker(GetTickerRequest) returns (GetTickerResponse);
  rpc SubscribePrices(SubscribePricesRequest) returns (stream PriceUpdate);
}

message MarketPair {
  string id = 1;
  string symbol = 2;
  string base_asset = 3;
  string quote_asset = 4;
  string exchange = 5;
  bool active = 6;
}

message GetPairsRequest {
  string exchange = 1;
}

message GetPairsResponse {
  repeated MarketPair pairs = 1;
}

message Candle {
  string symbol = 1;
  string exchange = 2;
  string interval = 3;
  double open = 4;
  double high = 5;
  double low = 6;
  double close = 7;
  double volume = 8;
  int64 timestamp = 9;
}

message GetCandlesRequest {
  string symbol = 1;
  string exchange = 2;
  string interval = 3;
  int32 limit = 4;
}

message GetCandlesResponse {
  repeated Candle candles = 1;
}

message GetTickerRequest {
  string symbol = 1;
  string exchange = 2;
}

message Ticker {
  string symbol = 1;
  double last_price = 2;
  double volume_24h = 3;
  double high_24h = 4;
  double low_24h = 5;
  double change_24h = 6;
}

message GetTickerResponse {
  Ticker ticker = 1;
}

message SubscribePricesRequest {
  repeated string symbols = 1;
}

message PriceUpdate {
  string symbol = 1;
  double price = 2;
  double volume = 3;
  int64 timestamp = 4;
}
